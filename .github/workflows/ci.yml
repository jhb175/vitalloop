name: VitalLoop CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Test and build
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version
          xcodebuild -showsdks

      - name: Beta metadata preflight
        run: sh scripts/beta-preflight.sh --skip-build

      - name: Verify local build
        run: sh scripts/verify-local.sh
