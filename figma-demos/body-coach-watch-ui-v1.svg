<svg width="1900" height="760" viewBox="0 0 1900 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="boardGlowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(280 20) rotate(55) scale(620 360)">
      <stop stop-color="#8FE8C2" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#8FE8C2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="boardGlowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1550 10) rotate(130) scale(620 380)">
      <stop stop-color="#62C5FF" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#62C5FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="screenBg" x1="0" y1="0" x2="416" y2="496" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111821"/>
      <stop offset="0.45" stop-color="#05070A"/>
      <stop offset="1" stop-color="#010203"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.055"/>
    </linearGradient>
    <linearGradient id="glassStrong" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="greenBlue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8FE8C2"/>
      <stop offset="1" stop-color="#62C5FF"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#000000" flood-opacity="0.36"/>
    </filter>
    <filter id="softGlow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="13" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .label { font-family: "SF Pro Text", "PingFang SC", Arial, sans-serif; font-size: 18px; font-weight: 760; fill: #101217; }
      .label-sub { font-family: "SF Pro Text", "PingFang SC", Arial, sans-serif; font-size: 13px; font-weight: 680; fill: #596473; }
      .time { font-family: "SF Pro Display", "PingFang SC", Arial, sans-serif; font-size: 20px; font-weight: 760; fill: #F5F7F8; }
      .tiny { font-family: "SF Pro Text", "PingFang SC", Arial, sans-serif; font-size: 12px; font-weight: 700; fill: #BAC1CC; }
      .micro { font-family: "SF Pro Text", "PingFang SC", Arial, sans-serif; font-size: 10px; font-weight: 700; fill: #9BA5B2; }
      .title { font-family: "SF Pro Display", "PingFang SC", Arial, sans-serif; font-size: 31px; font-weight: 780; fill: #F7F9FA; letter-spacing: 0; }
      .title-sm { font-family: "SF Pro Display", "PingFang SC", Arial, sans-serif; font-size: 25px; font-weight: 770; fill: #F7F9FA; letter-spacing: 0; }
      .body { font-family: "SF Pro Text", "PingFang SC", Arial, sans-serif; font-size: 14px; font-weight: 650; fill: #DDE3EA; letter-spacing: 0; }
      .muted { font-family: "SF Pro Text", "PingFang SC", Arial, sans-serif; font-size: 12px; font-weight: 680; fill: #B3BBC8; letter-spacing: 0; }
      .number { font-family: "SF Pro Display", "PingFang SC", Arial, sans-serif; font-size: 42px; font-weight: 790; fill: #FFFFFF; }
      .metric { font-family: "SF Pro Display", "PingFang SC", Arial, sans-serif; font-size: 22px; font-weight: 780; fill: #FFFFFF; }
      .accent { fill: #8FE8C2; }
      .blue { fill: #62C5FF; }
      .orange { fill: #FFC078; }
      .purple { fill: #D0CCFF; }
    </style>
  </defs>

  <rect width="1900" height="760" fill="#EEF3F4"/>
  <rect width="1900" height="760" fill="url(#boardGlowA)"/>
  <rect width="1900" height="760" fill="url(#boardGlowB)"/>
  <text x="54" y="68" class="label" style="font-size:42px">Body Coach Watch UI V1</text>
  <text x="56" y="105" class="label-sub" style="font-size:18px">Apple Watch 端不做 iPhone 缩小版，核心是 3 秒可读、1 次点击执行、表盘组件常驻。</text>

